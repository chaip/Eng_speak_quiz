<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ฝึกพูดภาษาอังกฤษ ป.2</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://code.responsivevoice.org/responsivevoice.js?key=1Q22KhOa"></script>
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f7f9fc; text-align: center; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
    h1 { color: #4a6fa5; font-size: 26px; }
    input[type="text"] { width: 80%; padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; outline: none; font-family: 'Kanit', sans-serif; text-align: center; }
    .sentence-box { font-size: 32px; font-weight: bold; color: #1e3d59; margin: 25px 0; background: #f5f7fa; padding: 20px; border-radius: 16px; border: 2px dashed #4a6fa5; }
    button { border: none; padding: 12px 25px; font-size: 18px; border-radius: 15px; cursor: pointer; transition: 0.2s; margin: 10px; font-family: 'Kanit', sans-serif; }
    .btn-listen { background-color: #4a6fa5; color: white; }
    .btn-mic { background-color: #ff6b6b; color: white; font-weight: bold; }
    .btn-mic.recording { background-color: #ff0000; animation: pulse 1.5s infinite; }
    .btn-next { background-color: #1dd1a1; color: white; }
    .result-box { background-color: #e8f4f8; padding: 15px; border-radius: 16px; margin-top: 20px; display: none; text-align: left; }
    .score-text { font-size: 24px; font-weight: bold; color: #ff6b6b; text-align: center; margin-bottom: 10px; }
    .screen { display: none; }
    .screen.active { display: block; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>
<div class="container">

  <div id="start-screen" class="screen active">
    <h1>🏫 แบบฝึกพูดภาษาอังกฤษ ป.2</h1>
    <p>ฟังคุณครูออกเสียง แล้วกดปุ่มไมโครโฟนเพื่อพูดตามนะจ๊ะ</p>
    <input type="text" id="student-name" placeholder="พิมพ์ชื่อตรงนี้เลยจ้า..." maxlength="20"><br>
    <button class="btn-listen" onclick="startApp()">เริ่มเล่นกันเลย! 🚀</button>
  </div>

  <div id="quiz-screen" class="screen">
    <h3 style="color: #888;">ข้อที่ <span id="current-index">1</span> / 5</h3>
    <div class="sentence-box" id="target-sentence">Loading...</div>
    <button class="btn-listen" onclick="playSampleAudio()">🔊 กดฟังเสียงตัวอย่าง</button>
    <button id="mic-btn" class="btn-mic" onclick="toggleRecording()">🎙️ กดแล้วพูดเลย</button>
    <div id="mic-status" style="font-size: 18px; font-weight: bold; color: #ff0000; margin-top: 10px;"></div>
    <div id="ai-result" class="result-box">
      <div class="score-text">คะแนน: <span id="ai-score">0</span>/100</div>
      <p><strong>💡 ที่หนูพูด:</strong> <span id="spoken-text">...</span></p>
      <p><strong>💬 คำแนะนำ:</strong> <span id="ai-feedback">...</span></p>
      <p><strong>💖 คุณครู Gemini:</strong> <span id="ai-encourage">...</span></p>
      <button id="next-btn" class="btn-next" style="display:none;" onclick="nextQuestion()">ไปข้อต่อไป ➡️</button>
    </div>
  </div>

  <div id="result-screen" class="screen">
    <h1>🎉 เย้! ครบ 5 ข้อแล้ว 🎉</h1>
    <div style="font-size: 60px; font-weight: bold; color: #1dd1a1; margin: 20px 0;"><span id="total-score">0</span> / 5</div>
    <p>บันทึกคะแนนเรียบร้อยแล้วจ้า!</p>
    <button class="btn-listen" onclick="resetApp()">🔀 สุ่มข้อสอบชุดใหม่</button>
  </div>

</div>

<script>
  // ⬇️ เปลี่ยนเป็น URL ของ GAS ที่ deploy ไว้
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby2INgCClflI34te6yZLyQeO4UVXpaUtRnYEI8vV8RlRK6IkIB9TcCkUBaSsDpWsMRg/exec';

  let quizData = [];
  let currentIndex = 0;
  let totalCorrectCount = 0;
  let isRecording = false;
  let studentName = "";

  async function startApp() {
    studentName = document.getElementById('student-name').value.trim();
    if (!studentName) {
      alert('กรุณาใส่ชื่อก่อนนะครับ 😊');
      return;
    }
    try {
      const res = await fetch(GAS_URL + '?action=getQuiz');
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      quizData = data;
      currentIndex = 0;
      totalCorrectCount = 0;
      showQuestion();
      switchScreen('quiz-screen');
    } catch (err) {
      alert('เชื่อมต่อ server ไม่ได้ครับ: ' + err);
    }
  }

  function showQuestion() {
    document.getElementById('ai-result').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('mic-btn').innerText = "🎙️ กดแล้วพูดเลย";
    document.getElementById('mic-status').innerText = "";
    let q = quizData[currentIndex];
    document.getElementById('current-index').innerText = currentIndex + 1;
    document.getElementById('target-sentence').innerText = q.sentence;
    setTimeout(() => playSampleAudio(), 500);
  }

  function playSampleAudio() {
    if (typeof responsiveVoice !== 'undefined') {
      responsiveVoice.speak(quizData[currentIndex].sentence, "US English Female", { rate: 0.8 });
    }
  }

  function toggleRecording() {
    if (isRecording) return;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("กรุณาใช้ Google Chrome ครับ");
      return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;

    const micBtn = document.getElementById('mic-btn');
    const micStatus = document.getElementById('mic-status');

    recognition.onstart = () => {
      isRecording = true;
      micBtn.innerText = "🛑 กำลังฟัง...";
      micBtn.classList.add('recording');
      micStatus.innerText = "🔴 พูดได้เลยจ้า 🎙️";
    };

    recognition.onresult = async (event) => {
      const spokenText = event.results[0][0].transcript;
      document.getElementById('spoken-text').innerText = spokenText;
      micStatus.innerText = "⏳ ส่งให้ AI ตรวจ...";
      micBtn.innerText = "⏳ รอแป๊บนึง...";
      micBtn.disabled = true;

      try {
        const res = await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'verifySpeech',
            spokenText: spokenText,
            correctSentence: quizData[currentIndex].sentence
          })
        });
        const aiResult = await res.json();

        document.getElementById('ai-score').innerText = aiResult.score;
        document.getElementById('ai-feedback').innerText = aiResult.feedback;
        document.getElementById('ai-encourage').innerText = aiResult.encouragement;
        document.getElementById('ai-result').style.display = 'block';
        document.getElementById('next-btn').style.display = 'inline-block';

        if (aiResult.isCorrect) totalCorrectCount++;
      } catch (err) {
        micStatus.innerText = "❌ เชื่อมต่อ server ไม่ได้: " + err;
      }

      micBtn.innerText = "🎙️ กดแล้วพูดเลย";
      micBtn.disabled = false;
      isRecording = false;
      micStatus.innerText = "";
    };

    recognition.onerror = (event) => {
      isRecording = false;
      micBtn.classList.remove('recording');
      micBtn.innerText = "🎙️ กดแล้วพูดเลย";
      if (event.error === 'no-speech') {
        micStatus.innerText = "❌ ไม่ได้ยินเสียง ลองใหม่นะจ๊ะ";
      } else {
        micStatus.innerText = "❌ error: " + event.error;
      }
    };

    recognition.onend = () => {
      isRecording = false;
      micBtn.classList.remove('recording');
    };

    recognition.start();
  }

  async function nextQuestion() {
    currentIndex++;
    if (currentIndex < quizData.length) {
      showQuestion();
    } else {
      document.getElementById('total-score').innerText = totalCorrectCount;
      try {
        await fetch(GAS_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'saveScore',
            name: studentName,
            totalCorrect: totalCorrectCount
          })
        });
      } catch (err) { console.error(err); }
      switchScreen('result-screen');
    }
  }

  function resetApp() {
    document.getElementById('student-name').value = "";
    switchScreen('start-screen');
  }

  function switchScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }
</script>
</body>
</html>
